    const categoryMeta = {
      vitamin: { label: '维生素', card: 'bg-blue-600 hover:bg-blue-700 shadow-blue-200 dark:shadow-blue-950/40' },
      mineral: { label: '矿物质', card: 'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-200 dark:shadow-emerald-950/40' },
      trace: { label: '微量元素', card: 'bg-fuchsia-700 hover:bg-fuchsia-800 shadow-fuchsia-200 dark:shadow-fuchsia-950/40' }
    };

    const validateData = () => {
      const sourceIds = new Set(Object.keys(sources));
      const errors = [];
      nutrientsData.forEach(item => sectionDefs.forEach(section => (item[section.key] || []).forEach((claim, index) => {
        if (!claim.sourceIds || claim.sourceIds.length === 0) errors.push(`${item.id}.${section.key}[${index}] 缺少来源`);
        (claim.sourceIds || []).forEach(id => { if (!sourceIds.has(id)) errors.push(`${item.id}.${section.key}[${index}] 未定义来源 ${id}`); });
      })));
      if (errors.length) console.error('NutriGuide source validation failed:', errors);
    };
    validateData();

    const SourceMarks = ({ ids, onOpen }) => (
      <span className="ml-1 inline-flex flex-wrap gap-1 align-baseline">
        {ids.map(id => (
          <button key={id} onClick={(event) => { event.stopPropagation(); onOpen(ids); }} className="rounded px-1.5 py-0.5 text-[11px] font-bold bg-white/80 text-blue-700 border border-blue-200 hover:bg-blue-50 dark:bg-slate-900 dark:text-blue-200 dark:border-blue-800" aria-label={`查看来源：${sources[id].title}`}>
            {sources[id].label}
          </button>
        ))}
      </span>
    );

    const ClaimList = ({ claims, isSeniorMode, onOpenSources }) => (
      <div className="space-y-3">
        {claims.map((claim, index) => (
          <p key={index} className={`text-slate-700 dark:text-slate-200 ${isSeniorMode ? 'text-xl leading-9' : 'text-sm leading-7'}`}>
            {claim.text}
            <SourceMarks ids={claim.sourceIds} onOpen={onOpenSources} />
          </p>
        ))}
      </div>
    );

    const SourceModal = ({ sourceIds, onClose }) => {
      const ids = sourceIds && sourceIds.length ? [...new Set(sourceIds)] : Object.keys(sources);
      return (
        <div className="fixed inset-0 z-[70] flex items-center justify-center bg-slate-950/70 p-4" role="dialog" aria-modal="true" onClick={onClose}>
          <div className="w-full max-w-xl max-h-[88vh] overflow-hidden rounded-lg bg-white shadow-2xl dark:bg-darkCard" onClick={event => event.stopPropagation()}>
            <div className="flex items-center justify-between border-b border-slate-200 p-4 dark:border-slate-700">
              <h3 className="text-lg font-bold">来源</h3>
              <button onClick={onClose} className="rounded-lg px-3 py-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800" aria-label="关闭来源弹窗"><i className="fa-solid fa-xmark"></i></button>
            </div>
            <div className="max-h-[70vh] space-y-3 overflow-y-auto p-4">
              {ids.map(id => {
                const item = sources[id];
                return (
                  <div key={id} className="rounded-lg border border-slate-200 p-4 dark:border-slate-700">
                    <p className="text-sm font-bold text-slate-900 dark:text-white">{item.title}</p>
                    <p className="mt-1 text-xs text-slate-500 dark:text-slate-400">{item.publisher} · {item.updatedOrAccessed}</p>
                    <a href={item.url} target="_blank" rel="noopener noreferrer" className="mt-3 inline-flex rounded-lg bg-blue-600 px-3 py-2 text-xs font-bold text-white hover:bg-blue-700">打开原始来源</a>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    const NutrientCard = ({ item, isDimmed, isHighlighted, onClick }) => (
      <button onClick={onClick} className={`nutrient-card relative aspect-square rounded-lg p-2 text-white shadow-lg ${categoryMeta[item.category].card} ${isDimmed ? 'opacity-30 grayscale' : ''} ${isHighlighted ? 'ring-4 ring-blue-200 dark:ring-blue-500' : ''}`} aria-label={`查看 ${item.name}`}>
        <span className="block text-2xl font-black sm:text-3xl">{item.shortName}</span>
        <span className="mt-1 block text-[10px] font-medium leading-tight opacity-95">{item.nameEn}</span>
        <span className="absolute right-1.5 top-1.5 rounded bg-white/20 px-1.5 py-0.5 text-[9px] font-bold">{categoryMeta[item.category].label}</span>
      </button>
    );

    const DetailModal = ({ item, isSeniorMode, setIsSeniorMode, onClose, onOpenSources }) => (
      <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/70 p-4" role="dialog" aria-modal="true" onClick={onClose}>
        <div className="flex max-h-[92vh] w-full max-w-3xl flex-col overflow-hidden rounded-lg bg-white shadow-2xl dark:bg-darkCard" onClick={event => event.stopPropagation()}>
          <div className="flex items-start justify-between gap-3 border-b border-slate-200 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900">
            <div>
              <p className="text-xs font-bold text-slate-500 dark:text-slate-400">{categoryMeta[item.category].label}</p>
              <h2 className="text-2xl font-black text-slate-900 dark:text-white">{item.name}</h2>
              <p className="text-sm text-slate-500 dark:text-slate-400">{item.nameEn}</p>
            </div>
            <div className="flex gap-2">
              <button onClick={() => setIsSeniorMode(!isSeniorMode)} className={`rounded-lg px-3 py-2 text-sm font-bold ${isSeniorMode ? 'bg-amber-100 text-amber-900 dark:bg-amber-900 dark:text-amber-100' : 'bg-white text-slate-600 border border-slate-200 dark:bg-slate-800 dark:text-slate-200 dark:border-slate-700'}`}>{isSeniorMode ? '大字版' : '标准字'}</button>
              <button onClick={onClose} className="rounded-lg bg-slate-200 px-3 py-2 text-slate-700 hover:bg-slate-300 dark:bg-slate-800 dark:text-white dark:hover:bg-slate-700" aria-label="关闭详情"><i className="fa-solid fa-xmark"></i></button>
            </div>
          </div>
          <div className="overflow-y-auto p-4">
            <div className="space-y-4">
              {sectionDefs.map(section => (
                <section key={section.key} className={`rounded-lg border p-4 ${section.wrap}`}>
                  <h3 className={`mb-3 flex items-center gap-2 font-bold ${section.heading} ${isSeniorMode ? 'text-2xl' : 'text-base'}`}>
                    <i className={`fa-solid ${section.icon}`}></i>
                    {section.title}
                  </h3>
                  <ClaimList claims={item[section.key]} isSeniorMode={isSeniorMode} onOpenSources={onOpenSources} />
                </section>
              ))}
            </div>
          </div>
          <div className="border-t border-slate-200 p-4 dark:border-slate-700">
            <button onClick={onClose} className="w-full rounded-lg bg-slate-100 py-3 font-bold text-slate-700 hover:bg-slate-200 dark:bg-slate-800 dark:text-white dark:hover:bg-slate-700">关闭</button>
          </div>
        </div>
      </div>
    );

    const App = () => {
      const [activeSymptom, setActiveSymptom] = useState(null);
      const [selectedNutrient, setSelectedNutrient] = useState(null);
      const [sourceFocus, setSourceFocus] = useState(null);
      const [isSeniorMode, setIsSeniorMode] = useState(false);
      const [isDark, setIsDark] = useState(false);
      useEffect(() => { document.documentElement.classList.toggle('dark', isDark); }, [isDark]);
      const activeDesc = symptomMap.find(item => item.id === activeSymptom)?.desc;

      return (
        <div className="app-shell">
          <header className="app-header sticky top-0 z-40 border-b border-slate-200 bg-white/95 backdrop-blur dark:border-slate-800 dark:bg-darkBg/95">
            <div className="mx-auto max-w-4xl px-4 py-3">
              <div className="flex items-start justify-between gap-3">
                <div className="flex gap-3">
                  <img src="https://img.icons8.com/color/96/healthy-food.png" alt="" className="h-10 w-10 rounded-lg bg-white p-1" />
                  <div>
                    <h1 className="text-xl font-black text-slate-950 dark:text-white">NutriGuide</h1>
                    <p className="text-xs text-slate-500 dark:text-slate-400">营养素权威速查 · 每条结论附来源</p>
                  </div>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setIsDark(!isDark)} className="rounded-lg bg-slate-100 px-3 py-2 text-slate-600 hover:bg-slate-200 dark:bg-slate-800 dark:text-amber-200 dark:hover:bg-slate-700" aria-label="切换深色模式"><i className={`fa-solid ${isDark ? 'fa-sun' : 'fa-moon'}`}></i></button>
                  <button onClick={() => setIsSeniorMode(!isSeniorMode)} className={`rounded-lg px-3 py-2 text-sm font-bold ${isSeniorMode ? 'bg-amber-100 text-amber-900 dark:bg-amber-900 dark:text-amber-100' : 'bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-200'}`}>{isSeniorMode ? '大字版' : '标准'}</button>
                  <button onClick={() => setSourceFocus(Object.keys(sources))} className="rounded-lg bg-blue-600 px-3 py-2 text-sm font-bold text-white hover:bg-blue-700">来源</button>
                </div>
              </div>
              <div className="mt-4 flex gap-2 overflow-x-auto pb-1 no-scrollbar">
                <button onClick={() => setActiveSymptom(null)} className={`shrink-0 rounded-lg px-3 py-2 text-sm font-bold ${activeSymptom === null ? 'bg-slate-900 text-white dark:bg-white dark:text-slate-900' : 'bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-300'}`}>全部</button>
                {symptomMap.map(symptom => (
                  <button key={symptom.id} onClick={() => setActiveSymptom(activeSymptom === symptom.id ? null : symptom.id)} className={`shrink-0 rounded-lg border px-3 py-2 text-sm font-bold ${activeSymptom === symptom.id ? 'border-blue-300 bg-blue-100 text-blue-800 dark:border-blue-700 dark:bg-blue-950 dark:text-blue-200' : 'border-slate-200 bg-white text-slate-600 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300'}`}>{symptom.label}</button>
                ))}
              </div>
            </div>
          </header>

          <main className="mx-auto max-w-4xl px-4 py-6">
            <div className="mb-5 rounded-lg border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-darkCard">
              <p className={`${isSeniorMode ? 'text-xl leading-9' : 'text-sm leading-7'} text-slate-700 dark:text-slate-200`}>
                本页用于快速查阅营养素信息，不替代医生、注册营养师或药师的个体化建议。
                <SourceMarks ids={['ods-supp-safe']} onOpen={setSourceFocus} />
              </p>
            </div>
            {activeDesc && <div className="mb-4 rounded-lg bg-blue-50 p-3 text-center text-sm font-bold text-blue-800 animate-pulseOnce dark:bg-blue-950 dark:text-blue-200">{activeDesc}</div>}
            <div className="grid grid-cols-4 gap-3 sm:grid-cols-5 md:grid-cols-7 animate-fadeIn">
              {nutrientsData.map(item => {
                const isDimmed = activeSymptom && !item.tags.includes(activeSymptom);
                const isHighlighted = activeSymptom && item.tags.includes(activeSymptom);
                return <NutrientCard key={item.id} item={item} isDimmed={isDimmed} isHighlighted={isHighlighted} onClick={() => setSelectedNutrient(item)} />;
              })}
            </div>
          </main>
          {selectedNutrient && <DetailModal item={selectedNutrient} isSeniorMode={isSeniorMode} setIsSeniorMode={setIsSeniorMode} onClose={() => setSelectedNutrient(null)} onOpenSources={setSourceFocus} />}
          {sourceFocus && <SourceModal sourceIds={sourceFocus} onClose={() => setSourceFocus(null)} />}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
