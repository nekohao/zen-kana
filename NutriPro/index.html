  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8f5; --surface: rgba(255,255,255,.82); --solid: #fff;
      --text: #111; --muted: #67706c; --hair: rgba(20,26,23,.12);
      --accent: #28786d; --accent-soft: #e4efeb; --warn: #9a681f;
      --shadow: 0 1px 0 rgba(18,24,21,.04);
      --top: env(safe-area-inset-top); --bottom: env(safe-area-inset-bottom);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#080a09; --surface:rgba(24,26,25,.78); --solid:#141716; --text:#f4f5f2; --muted:#9aa29d; --hair:rgba(245,248,244,.14); --accent:#7fc8bb; --accent-soft:rgba(127,200,187,.16); --shadow:0 14px 38px rgba(0,0,0,.38); }
    }
    * { box-sizing: border-box; letter-spacing: 0; }
    html, body { margin: 0; min-height: 100%; overflow-x: hidden; background: var(--bg); color: var(--text); }
    body { -webkit-tap-highlight-color: transparent; font-size: 16px; }
    button, input { font: inherit; color: inherit; }
    button { border: 0; background: none; padding: 0; touch-action: manipulation; cursor: pointer; }
    a { color: inherit; }
    .app { min-height: 100vh; min-height: 100dvh; display: grid; grid-template-rows: auto 1fr auto; padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
    .topbar { position: sticky; top: 0; z-index: 20; padding: calc(var(--top) + 12px) 16px 10px; background: color-mix(in srgb, var(--bg) 82%, transparent); backdrop-filter: blur(24px) saturate(150%); -webkit-backdrop-filter: blur(24px) saturate(150%); border-bottom: 1px solid color-mix(in srgb, var(--hair) 70%, transparent); }
    .title-row { min-height: 48px; display: flex; align-items: flex-end; }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .mark { width: 32px; height: 32px; border-radius: 8px; background: #111; display: grid; place-items: center; flex: 0 0 auto; }
    .mark svg { width: 22px; height: 22px; }
    h1 { margin: 0; font-size: 28px; line-height: 1.02; font-weight: 820; }
    .subtitle { margin: 3px 0 1px; font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pill-btn { min-height: 36px; min-width: 52px; padding: 0 10px; border-radius: 8px; background: var(--solid); border: 1px solid var(--hair); color: var(--text); font-size: 14px; font-weight: 700; white-space: nowrap; }
    .search-line { margin-top: 10px; display: block; }
    .search { height: 40px; min-width: 0; display: flex; align-items: center; gap: 8px; padding: 0 12px; border-radius: 8px; background: color-mix(in srgb, var(--text) 7%, transparent); border: 1px solid transparent; }
    .search span { color: var(--muted); font-size: 17px; }
    .search input { width: 100%; min-width: 0; border: 0; outline: 0; background: transparent; font-size: 16px; }
    .chips { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0 1px; scrollbar-width: none; }
    .chips::-webkit-scrollbar { display: none; }
    .chip { flex: 0 0 auto; min-height: 34px; padding: 0 12px; border-radius: 8px; background: color-mix(in srgb, var(--text) 6%, transparent); border: 1px solid transparent; color: var(--muted); font-size: 14px; font-weight: 700; }
    .chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    main { min-width: 0; overflow: auto; padding: 14px 16px calc(92px + var(--bottom)); }
    .section-head { display: flex; align-items: end; justify-content: space-between; gap: 12px; margin: 2px 0 12px; }
    .section-head h2 { margin: 0; font-size: 15px; line-height: 1.2; color: var(--muted); font-weight: 760; }
    .count { color: var(--muted); font-size: 13px; white-space: nowrap; }
    .list { display: block; overflow: hidden; border-radius: 8px; border: 1px solid var(--hair); background: var(--surface); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); box-shadow: var(--shadow); }
    .nutri { position: relative; min-height: 72px; width: 100%; text-align: left; background: transparent; padding: 9px 12px; display: grid; grid-template-columns: 1fr 36px; gap: 8px; align-items: center; }
    .nutri:not(:last-child)::after { content: ""; position: absolute; left: 72px; right: 0; bottom: 0; height: 1px; background: var(--hair); }
    .badge { width: 42px; height: 42px; border-radius: 8px; display: grid; place-items: center; background: var(--accent-soft); color: var(--accent); font-size: 15px; font-weight: 850; border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent); }
    .nutri h3 { margin: 0; font-size: 17px; line-height: 1.18; }
    .nutri p { margin: 4px 0 0; color: var(--muted); font-size: 13px; line-height: 1.34; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .open-hit { text-align: left; min-width: 0; min-height: 54px; display: grid; grid-template-columns: 42px minmax(0, 1fr); gap: 12px; align-items: center; }
    .star { width: 36px; height: 44px; border-radius: 8px; color: var(--muted); font-size: 20px; }
    .star.on { color: var(--warn); }
    .empty { border: 1px dashed var(--hair); border-radius: 8px; padding: 28px 18px; color: var(--muted); text-align: center; line-height: 1.5; }
    .tabbar { position: fixed; left: env(safe-area-inset-left); right: env(safe-area-inset-right); bottom: 0; z-index: 25; padding: 6px 12px calc(7px + var(--bottom)); background: color-mix(in srgb, var(--bg) 78%, transparent); border-top: 1px solid color-mix(in srgb, var(--hair) 75%, transparent); backdrop-filter: blur(26px) saturate(160%); -webkit-backdrop-filter: blur(26px) saturate(160%); display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .tab { min-height: 48px; border-radius: 8px; color: var(--muted); display: grid; place-items: center; align-content: center; gap: 2px; font-size: 11px; font-weight: 750; }
    .tab b { font-size: 19px; line-height: 1; }
    .tab.active { color: var(--accent); background: transparent; }
    .sheet { position: fixed; inset: 0; z-index: 50; display: none; background: rgba(0,0,0,.28); padding: calc(var(--top) + 18px) 12px calc(var(--bottom) + 12px); }
    .sheet.open { display: grid; align-items: end; }
    .panel { max-height: min(780px, calc(100dvh - var(--top) - var(--bottom) - 32px)); overflow: hidden; border-radius: 8px; background: var(--solid); border: 1px solid var(--hair); box-shadow: 0 26px 70px rgba(0,0,0,.24); display: grid; grid-template-rows: auto 1fr auto; }
    .panel-head { min-height: 60px; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--hair); }
    .panel-title { min-width: 0; }
    .panel-title h2 { margin: 0; font-size: 21px; line-height: 1.15; }
    .panel-title p { margin: 3px 0 0; color: var(--muted); font-size: 13px; }
    .panel-actions { display: flex; gap: 8px; flex: 0 0 auto; }
    .icon-btn { width: 44px; height: 44px; border-radius: 8px; background: var(--bg); border: 1px solid var(--hair); font-size: 20px; }
    .panel-body { overflow: auto; padding: 12px 14px 16px; }
    .fact { border-bottom: 1px solid var(--hair); padding: 15px 0; }
    .fact:first-child { padding-top: 2px; }
    .fact h3 { margin: 0 0 7px; font-size: 15px; color: var(--accent); }
    .fact p { margin: 0; font-size: 15px; line-height: 1.68; overflow-wrap: anywhere; }
    .source-link { margin-left: 6px; display: inline-flex; align-items: center; min-height: 24px; padding: 0 6px; border-radius: 6px; background: var(--accent-soft); color: var(--accent); font-size: 12px; font-weight: 800; text-decoration: none; }
    .panel-foot { padding: 10px 14px 14px; border-top: 1px solid var(--hair); color: var(--muted); font-size: 12px; line-height: 1.45; }
    .toast { position: fixed; left: 50%; bottom: calc(82px + var(--bottom)); transform: translateX(-50%) translateY(18px); opacity: 0; pointer-events: none; z-index: 80; min-height: 36px; max-width: calc(100vw - 48px); padding: 8px 12px; border-radius: 8px; background: rgba(20,22,21,.88); color: #fff; font-size: 13px; transition: opacity .18s ease, transform .18s ease; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (min-width: 760px) { .topbar, main { max-width: 760px; margin: 0 auto; } .tabbar { left: 50%; right: auto; transform: translateX(-50%); width: min(760px, 100vw); } .sheet { justify-items: center; } .panel { width: min(720px, calc(100vw - 24px)); } }
  </style>
</head>

      ['iodine','碘','碘','Iodine','thyroid energy brain','甲状腺激素合成所必需。','成人 RDA 150 mcg；UL 1,100 mcg。','海藻、鱼类、奶制品、加碘盐和部分谷物制品。','有甲状腺病史或使用胺碘酮者不宜自行使用高碘补充剂。'],
      ['cu','铜','铜','Copper','blood bone immune','参与能量产生、铁代谢、结缔组织形成和抗氧化防御。','成人 RDA 900 mcg；UL 10,000 mcg。','贝类、种子、坚果、动物内脏、全谷物和巧克力。','高剂量锌可降低铜吸收。'],
      ['mn','锰','锰','Manganese','bone energy','参与代谢、骨形成和抗氧化过程。','成人男 AI 2.3 mg，女 AI 1.8 mg；UL 11 mg。','全谷物、贝类、坚果、豆类、米饭、茶和部分蔬菜。','长期高暴露可产生神经系统毒性，肝功能受损者可能更易蓄积。']
    ].map(([id,shortName,name,en,tags,basic,intake,foods,risk]) => ({id,shortName,name,en,tags:tags.split(' '), sourceId:id, facts:{'作用':basic,'摄入':intake,'食物':foods,'关键提醒':risk}}));
    const detailFacts = {
      va:{'缺乏':'早期常见表现是暗适应能力下降，严重缺乏可发展为干眼症并增加感染风险。','过量':'过量风险主要来自预成型维生素 A 或高剂量补充剂，可能出现头痛、恶心、肝损伤和骨骼问题。','药物/疾病':'正在使用异维 A 酸类药物、奥利司他或可能影响肝脏的药物时，不建议自行叠加维生素 A。','老年人':'老年人更应优先从胡萝卜、南瓜、深绿色蔬菜等食物获得维生素 A 原，补充剂剂量要看总摄入量。'},
      vd:{'缺乏':'缺乏会影响钙吸收和骨骼矿化，成人可能出现骨软化，长期不足也会增加骨质疏松风险。','过量':'过量通常表现为高钙血症相关问题，例如恶心、口渴、尿频、肌无力或肾结石风险。','药物/疾病':'噻嗪类利尿剂、类固醇、奥利司他和部分降脂药可能影响维生素 D 状态或安全性。','老年人':'70 岁以上成人推荐摄入量更高，但是否补充和补多少应结合 25(OH)D 检测、肾功能和用药情况。'},
      ve:{'缺乏':'普通饮食中缺乏较少见，脂肪吸收障碍人群可能出现神经和肌肉相关问题。','过量':'高剂量 α-生育酚补充剂可能增加出血风险，不适合把“抗氧化”当作越多越好。','药物/疾病':'使用华法林、阿司匹林或其他抗凝抗血小板药物时，维生素 E 补充剂应先让医生或药师核对。','老年人':'老年人如已有出血风险、近期手术或正在用抗凝药，应避免自行高剂量补充。'},
      vk:{'缺乏':'缺乏会影响凝血功能，可能表现为出血倾向或凝血时间延长。','过量':'天然维生素 K 未设 UL，但这不代表补充剂对所有用药者都没有风险。','药物/疾病':'华法林等维生素 K 拮抗剂会被维生素 K 摄入变化影响，用药期间重点是稳定摄入。','老年人':'如果正在用华法林，不要突然大量增加或减少绿叶菜和维生素 K 补充剂。'},
      b1:{'缺乏':'缺乏可导致脚气病，也可能出现神经系统和心血管相关表现。','过量':'硫胺素未设 UL，口服高摄入量导致毒性的证据有限。','药物/疾病':'长期饮酒、利尿剂使用或营养摄入不足会增加缺乏风险。','老年人':'长期食欲差、饮食单一或饮酒的老年人，如出现乏力、麻木或意识改变，应考虑让医生评估 B1 状态。'},
      b2:{'缺乏':'缺乏可能出现口角炎、唇炎、舌炎、脂溢性皮炎和贫血。','过量':'核黄素未设 UL，高摄入量导致不良反应的证据有限。','药物/疾病':'如果长期服药且出现口腔、皮肤或贫血相关问题，应让医生结合整体营养状态判断。','老年人':'奶类、蛋类和肉类摄入很少的人，更需要留意 B2 来源是否稳定。'},
      b3:{'缺乏':'严重缺乏可导致糙皮病，典型问题包括皮炎、腹泻和神经精神改变。','过量':'补充剂或药物剂量的烟酸可导致潮红、肝毒性、高血糖和高尿酸。','药物/疾病':'与降脂药、降压药、抗凝药、糖尿病药或肝毒性药物同用时，需要医生监测。','老年人':'不要自行用高剂量烟酸降血脂；这属于医疗用途，不是普通保健补充。'},
      b6:{'缺乏':'缺乏可出现贫血、皮炎、舌炎、抑郁、意识混乱和免疫功能改变。','过量':'长期高剂量补充剂可导致感觉神经病变，表现为麻木、刺痛或平衡问题。','药物/疾病':'部分抗癫痫药、茶碱和环丝氨酸等药物可能与 B6 状态或补充剂相互影响。','老年人':'复合维生素和单方 B6 要合并计算剂量，避免长期接近或超过 UL。'},
      folate:{'缺乏':'缺乏可导致巨幼细胞性贫血，并可能出现疲劳、虚弱、头痛、心悸和气短。','过量':'高剂量合成叶酸可能掩盖维生素 B12 缺乏，延误神经损害识别。','药物/疾病':'甲氨蝶呤、部分抗癫痫药和柳氮磺吡啶等药物可能需要医生单独管理叶酸。','老年人':'补叶酸前最好同时关注 B12，尤其是长期素食、胃酸不足或使用二甲双胍的人群。'},
      b12:{'缺乏':'缺乏可导致巨幼细胞性贫血，也可能出现麻木、刺痛、平衡问题、记忆或认知改变。','过量':'维生素 B12 未设 UL，高摄入量导致毒性的证据有限。','药物/疾病':'二甲双胍和长期胃酸抑制药可能影响 B12 状态。','老年人':'50 岁以上成人从天然食物中吸收 B12 的能力可能下降，强化食品或补充剂通常更可靠。'},
      vc:{'缺乏':'严重缺乏会导致坏血病，表现可包括牙龈问题、瘀点、伤口愈合不良和关节疼痛。','过量':'高剂量维生素 C 可导致腹泻、恶心和腹部痉挛，有肾结石风险者尤其要谨慎。','药物/疾病':'正在接受化疗或放疗的人，不应自行高剂量使用抗氧化补充剂。','老年人':'优先从水果和蔬菜获得维 C；如果用补充剂，避免把剂量拉到接近 UL。'},
      ca:{'缺乏':'长期摄入不足会影响骨量；严重低钙血症可出现麻木、刺痛、肌肉痉挛或心律问题。','过量':'补充剂过量可增加便秘、肾结石和高钙血症风险。','药物/疾病':'钙会影响部分抗生素、双膦酸盐、左甲状腺素和铁锌镁吸收，需要错开或遵医嘱。','老年人':'补钙前要看总摄入量、维生素 D 状态、肾结石史、肾功能和骨质疏松用药。'},
      mg:{'缺乏':'缺乏可出现食欲下降、恶心、疲劳、麻木、肌肉抽筋、癫痫发作或心律异常。','过量':'食物来源镁通常安全，补充剂或含镁药物过量可导致腹泻、恶心和严重毒性。','药物/疾病':'双膦酸盐、部分抗生素、利尿剂和质子泵抑制剂可能与镁状态或吸收有关。','老年人':'肾功能下降者排镁能力可能降低，使用含镁泻药或补充剂前要谨慎。'},
      k:{'缺乏':'低钾可造成疲劳、肌无力、便秘和心律异常。','过量':'肾功能受损或使用影响排钾药物时，高钾血症可能造成肌无力、麻痹和心律异常。','药物/疾病':'ACE 抑制剂、ARB 和保钾利尿剂会影响血钾，用药者不应自行使用钾补充剂。','老年人':'有肾病、高血压用药或心衰用药时，低钠盐也要先问医生，因为它通常含钾。'},
      na:{'缺乏':'低钠血症可出现头痛、恶心、肌肉痉挛、疲劳、意识混乱和癫痫发作。','过量':'较高钠摄入与较高血压风险相关，高血压会增加心血管风险。','药物/疾病':'利尿剂、心衰、肝硬化或肾病患者的钠和液体策略应由医生决定。','老年人':'血压通常会随年龄上升，因此控制钠摄入对老年人更重要，但不应自行极端限盐。'},
      fe:{'缺乏':'缺乏可发展为缺铁性贫血，表现为疲劳、虚弱、免疫功能下降和体温调节受影响。','过量':'过量铁可造成胃肠不适，急性高剂量摄入可导致严重中毒。','药物/疾病':'铁会影响左甲状腺素、左旋多巴、部分抗生素和胃酸抑制药相关管理。','老年人':'成年男性和绝经后女性未确认缺铁时，不适合自行长期补铁。'},
      zn:{'缺乏':'缺乏可影响免疫、食欲、味觉嗅觉、伤口愈合和皮肤状态。','过量':'长期过量锌可导致铜缺乏、免疫功能下降和 HDL 胆固醇降低。','药物/疾病':'锌会影响部分抗生素和青霉胺吸收，通常需要错开服用。','老年人':'如果为了免疫长期吃锌，应同时关注剂量、持续时间和铜状态。'},
      se:{'缺乏':'缺乏较少见，但与克山病、男性不育和甲状腺相关问题有关。','过量':'过量硒可导致蒜味口气、金属味、脱发、指甲脆裂、胃肠不适和神经系统异常。','药物/疾病':'常规药物相互作用证据有限，但多补充剂叠加时仍应核对总硒摄入。','老年人':'巴西坚果含硒很高，不宜和硒补充剂长期叠加到接近 UL。'},
      iodine:{'缺乏':'缺乏可导致甲状腺肿和甲状腺功能减退，孕期和婴幼儿期还会影响神经发育。','过量':'过量碘也可能诱发甲状腺功能减退或亢进，甲状腺病史者更要谨慎。','药物/疾病':'胺碘酮、抗甲状腺药和含碘药物会显著影响碘和甲状腺状态。','老年人':'有甲状腺结节、甲亢甲减史或使用胺碘酮的人，不应自行吃高碘海藻或补充剂。'},
      cu:{'缺乏':'缺乏可导致贫血、白细胞偏低、骨质疏松和神经系统问题。','过量':'过量铜可导致胃肠症状，严重时可造成肝损伤。','药物/疾病':'高剂量锌会降低铜吸收，长期补锌者应关注铜状态。','老年人':'如果长期使用锌补充剂或饮食很单一，出现贫血或神经症状时不要只盯着铁和 B12。'},
      mn:{'缺乏':'人类锰缺乏很少见，研究中报道过骨矿化和代谢相关变化。','过量':'长期高暴露锰可产生神经系统毒性，症状可能类似运动障碍。','药物/疾病':'肝功能受损者可能更容易蓄积锰，补充剂不宜自行加量。','老年人':'有肝胆疾病或神经系统症状的人，不建议使用高锰补充剂。'}
    };
    nutrients.forEach(item => { item.facts = {...item.facts, ...(detailFacts[item.id] || {})}; });
    const filters = [['all','全部'],['bone','骨骼'],['immune','免疫'],['heart','心血管'],['brain','神经'],['blood','血液'],['skin','皮肤'],['energy','代谢'],['thyroid','甲状腺']];
    const el = id => document.getElementById(id);
    let state = loadStore(), view = 'all', filter = 'all', query = '', current = null, toastTimer = null;
    function loadStore(){ try { const raw = JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); if (raw.version !== STORE_VERSION) throw new Error('version'); return {version:STORE_VERSION, favorites:Array.isArray(raw.favorites)?raw.favorites:[], recent:Array.isArray(raw.recent)?raw.recent.slice(0,20):[], settings:raw.settings && typeof raw.settings==='object'?raw.settings:{}}; } catch { return {version:STORE_VERSION, favorites:[], recent:[], settings:{}}; } }
    function saveStore(){ localStorage.setItem(STORE_KEY, JSON.stringify({version:STORE_VERSION, favorites:state.favorites, recent:state.recent.slice(0,20), settings:state.settings || {}})); }
    function toast(msg){ clearTimeout(toastTimer); el('toast').textContent = msg; el('toast').classList.add('show'); toastTimer = setTimeout(()=>el('toast').classList.remove('show'), 1500); }
    function sourceMark(id){ const s = sources[id] || sources.supp; return `<a class="source-link" href="${s.url}" target="_blank" rel="noopener noreferrer">${s.label}</a>`; }
    function getItems(){ let items = nutrients; if (view === 'favorites') items = items.filter(n => state.favorites.includes(n.id)); if (view === 'recent') items = state.recent.map(id => nutrients.find(n => n.id === id)).filter(Boolean); if (filter !== 'all' && view === 'all') items = items.filter(n => n.tags.includes(filter)); const q = query.trim().toLowerCase(); if (q) items = items.filter(n => [n.shortName,n.name,n.en,...Object.values(n.facts)].join(' ').toLowerCase().includes(q)); return items; }
    function renderChips(){ el('chips').innerHTML = `<button class="chip" data-source="all" type="button">来源</button>` + filters.map(([id,label]) => `<button class="chip ${filter===id?'active':''}" data-filter="${id}" type="button">${label}</button>`).join(''); }
    function render(){ renderChips(); document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === view)); const items = getItems(); el('viewTitle').textContent = view === 'favorites' ? '收藏' : view === 'recent' ? '最近查看' : (filter === 'all' ? '全部营养素' : filters.find(f=>f[0]===filter)[1]); el('count').textContent = `${items.length} 项`; el('list').innerHTML = items.length ? items.map(n => `<div class="nutri"><button class="open-hit" data-open="${n.id}" type="button"><div class="badge">${n.shortName}</div><div><h3>${n.name}</h3><p>${n.facts['作用']}</p></div></button><button class="star ${state.favorites.includes(n.id)?'on':''}" data-fav="${n.id}" type="button" aria-label="收藏">${state.favorites.includes(n.id)?'★':'☆'}</button></div>`).join('') : `<div class="empty">没有匹配的营养素</div>`; }
    function toggleFav(id){ const has = state.favorites.includes(id); state.favorites = has ? state.favorites.filter(x => x !== id) : [id, ...state.favorites]; saveStore(); toast(has ? '已取消收藏' : '已收藏'); render(); if (current && current.id === id) updateFavButton(); }
    function updateFavButton(){ el('sheetFav').hidden = false; el('sheetFav').textContent = state.favorites.includes(current.id) ? '★' : '☆'; }
    function openItem(id){ current = nutrients.find(n => n.id === id); if (!current) return; state.recent = [id, ...state.recent.filter(x => x !== id)].slice(0,20); saveStore(); el('sheetTitle').textContent = current.name; el('sheetSub').textContent = current.en; el('sheetBody').innerHTML = Object.entries(current.facts).map(([k,v]) => `<section class="fact"><h3>${k}</h3><p>${v}${sourceMark(current.sourceId)}</p></section>`).join(''); updateFavButton(); el('sheet').classList.add('open'); el('sheet').setAttribute('aria-hidden','false'); render(); }
    function closeSheet(){ el('sheet').classList.remove('open'); el('sheet').setAttribute('aria-hidden','true'); current = null; }
    el('search').addEventListener('input', e => { query = e.target.value; render(); });
    function openSources(){ const body = Object.values(sources).map(s => `<section class="fact"><h3>${s.label}</h3><p><a href="${s.url}" target="_blank" rel="noopener noreferrer">${s.title}</a></p></section>`).join(''); current = null; el('sheetTitle').textContent = '来源'; el('sheetSub').textContent = '权威资料入口'; el('sheetBody').innerHTML = body; el('sheetFav').hidden = true; el('sheet').classList.add('open'); el('sheet').setAttribute('aria-hidden','false'); }
    el('chips').addEventListener('click', e => { const sourceButton = e.target.closest('[data-source]'); if (sourceButton) { openSources(); return; } const b = e.target.closest('[data-filter]'); if (!b) return; filter = b.dataset.filter; if (view !== 'all') view = 'all'; render(); });
    document.querySelector('.tabbar').addEventListener('click', e => { const b = e.target.closest('[data-view]'); if (!b) return; view = b.dataset.view; render(); });
    el('list').addEventListener('click', e => { const fav = e.target.closest('[data-fav]'); if (fav) { e.stopPropagation(); toggleFav(fav.dataset.fav); return; } const open = e.target.closest('[data-open]'); if (open) openItem(open.dataset.open); });
    el('sheetClose').addEventListener('click', closeSheet);
    el('sheet').addEventListener('click', e => { if (e.target === el('sheet')) closeSheet(); });
    el('sheetFav').addEventListener('click', () => current && toggleFav(current.id));
    if ('serviceWorker' in navigator && location.protocol !== 'file:') navigator.serviceWorker.register('./sw.js').catch(() => {});
    render();
  </script>
