<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f6f2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KanaZen">
  <meta name="format-detection" content="telephone=no">
  <meta name="kanazen-build" content="ZenPro-v2-20260417">
  <title>KanaZen</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/icons/icon-1024.png">
  <link rel="icon" href="./assets/icons/icon-192.png" type="image/png">
  <style>
:root {
  --paper: #f4f6f2;
  --paper-2: #e7ece6;
  --ink: #1f2320;
  --muted: #70756d;
  --line: rgba(31, 35, 32, 0.12);
  --glass: rgba(255, 255, 253, 0.72);
  --accent: #b83b40;
  --accent-dark: #812b2f;
  --celadon: #5d8b7d;
  --gold: #b28a3f;
  --shadow: 0 18px 45px rgba(31, 35, 32, 0.12);
  --bar: rgba(246, 246, 241, 0.86);
  --radius: 8px;
  --tap: 48px;
  --kana-practice-font: "Yu Kyokasho", "UD Digi Kyokasho N-R", "Hiragino Maru Gothic ProN", "Hiragino Sans", "Yu Gothic", "Noto Sans CJK JP", sans-serif;
}

* { box-sizing: border-box; }

html, body {
  width: 100%;
  min-height: 100%;
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
    "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans CJK SC", sans-serif;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior-y: none;
}

body {
  min-height: 100dvh;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.5;
  background-image:
    linear-gradient(rgba(31, 35, 32, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(31, 35, 32, 0.025) 1px, transparent 1px);
  background-size: 32px 32px, 32px 32px;
}

button, input, textarea {
  font: inherit;
}

button {
  border: 0;
  color: inherit;
  background: none;
  touch-action: manipulation;
}

.app-shell {
  position: relative;
  width: 100%;
  height: 100dvh;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(244, 246, 242, 0.96), rgba(231, 236, 230, 0.88));
}

.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 30;
  padding: calc(env(safe-area-inset-top) + 10px) 18px 10px;
  background: var(--bar);
  backdrop-filter: blur(24px) saturate(150%);
  -webkit-backdrop-filter: blur(24px) saturate(150%);
  border-bottom: 1px solid rgba(31, 35, 32, 0.08);
}

.brand-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  max-width: 720px;
  margin: 0 auto;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.brand-mark {
  width: 38px;
  height: 38px;
  display: block;
  object-fit: cover;
  border-radius: 10px;
  background: #f3efe4;
  border: 1px solid rgba(31, 35, 32, 0.08);
  box-shadow: 0 10px 24px rgba(31, 35, 32, 0.1);
}

.brand-title {
  display: grid;
  gap: 2px;
  min-width: 0;
}

.brand-title strong {
  font-size: 18px;
  line-height: 1;
}

.brand-title span {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
}

.version-entry {
  min-width: 92px;
  padding: 7px 9px;
  display: grid;
  justify-items: end;
  gap: 2px;
  border: 1px solid rgba(31, 35, 32, 0.08);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.46);
  color: var(--muted);
  white-space: nowrap;
}

.version-entry:active {
  transform: scale(0.98);
}

.screen-name {
  font-size: 12px;
  font-weight: 780;
  line-height: 1.1;
}

.version-line {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  font-size: 10px;
  font-weight: 780;
  line-height: 1.15;
}

.version-build {
  color: var(--ink);
}

.version-state {
  color: var(--celadon);
}

.version-state.is-warn {
  color: var(--accent-dark);
}

.content {
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: calc(env(safe-area-inset-top) + 78px) 16px calc(env(safe-area-inset-bottom) + 94px);
}

.screen {
  width: min(100%, 720px);
  margin: 0 auto;
  animation: rise 260ms ease both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.stack { display: grid; gap: 14px; }
.row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.tight { display: grid; gap: 8px; }

.panel {
  border: 1px solid rgba(255, 255, 255, 0.72);
  border-radius: var(--radius);
  background: var(--glass);
  box-shadow: var(--shadow);
  backdrop-filter: blur(26px) saturate(145%);
  -webkit-backdrop-filter: blur(26px) saturate(145%);
}

.section-title {
  margin: 4px 2px 0;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

.hero-panel {
  padding: 20px;
  min-height: 214px;
  display: grid;
  align-content: space-between;
  gap: 20px;
}

.hero-kana {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}

.hero-kana .kana {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", "Times New Roman", serif;
  font-size: 86px;
  line-height: 0.95;
  font-weight: 700;
}

.metric-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.home-metrics {
  grid-template-columns: repeat(2, 1fr);
}

.metric {
  min-height: 72px;
  padding: 12px;
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.54);
  border: 1px solid var(--line);
}

.metric strong {
  display: block;
  font-size: 24px;
  line-height: 1.1;
}

.metric span {
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
}

.primary-button, .ghost-button, .danger-button, .chip, .tab-button, .kana-cell, .option {
  min-height: var(--tap);
  border-radius: var(--radius);
  transition: transform 140ms ease, opacity 140ms ease, background 180ms ease, border-color 180ms ease;
}

.primary-button:active, .ghost-button:active, .danger-button:active, .chip:active,
.tab-button:active, .kana-cell:active, .option:active {
  transform: scale(0.98);
}

button:disabled {
  opacity: 0.42;
  pointer-events: none;
}

.primary-button {
  width: 100%;
  padding: 14px 16px;
  color: white;
  background: var(--ink);
  font-weight: 800;
  box-shadow: 0 18px 32px rgba(31, 35, 32, 0.18);
}

.accent-button { background: var(--accent); box-shadow: 0 18px 32px rgba(184, 59, 64, 0.24); }

.ghost-button, .danger-button {
  width: 100%;
  padding: 12px 14px;
  background: rgba(255, 255, 255, 0.58);
  border: 1px solid var(--line);
  color: var(--ink);
  font-weight: 750;
}

.danger-button { color: var(--accent-dark); }

.segmented, .chip-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 2px;
  scrollbar-width: none;
}

.segmented::-webkit-scrollbar, .chip-row::-webkit-scrollbar { display: none; }

.write-toolbar {
  display: grid;
  grid-template-columns: max-content minmax(0, 1fr);
  gap: 8px;
  align-items: center;
}

.write-toolbar .script-toggle,
.write-toolbar .chip-row {
  min-width: 0;
}

.script-toggle {
  width: 68px;
  padding: 0 8px;
  display: grid;
  place-items: center;
}

.write-toolbar .chip-row .chip {
  flex: 0 0 44px;
  padding: 0;
  font-family: var(--kana-practice-font);
  font-size: 18px;
  font-weight: 760;
}

.write-actions {
  display: grid;
  grid-template-columns: 0.82fr 1.18fr;
  gap: 8px;
  align-items: stretch;
}

.write-actions.secondary {
  grid-template-columns: repeat(3, 1fr);
}

.chip {
  padding: 0 14px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.58);
  color: var(--muted);
  font-size: 13px;
  font-weight: 780;
  white-space: nowrap;
}

.chip.is-active {
  color: white;
  background: var(--ink);
  border-color: var(--ink);
}

.chip.is-done:not(.is-active) {
  color: #2c6b59;
  background: rgba(93, 139, 125, 0.16);
  border-color: rgba(93, 139, 125, 0.22);
}

.kana-board {
  display: grid;
  gap: 8px;
}

.kana-row {
  display: grid;
  grid-template-columns: 32px repeat(5, minmax(0, 1fr));
  gap: 7px;
  align-items: center;
}

.row-label {
  color: var(--muted);
  font-weight: 800;
  font-size: 12px;
  text-align: center;
}

.kana-cell {
  aspect-ratio: 1 / 1;
  min-height: 0;
  display: grid;
  place-items: center;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.56);
  position: relative;
}

.kana-cell.is-empty {
  background: transparent;
  border-color: transparent;
  box-shadow: none;
  pointer-events: none;
}

.kana-cell.is-locked {
  opacity: 0.34;
  filter: grayscale(0.8);
}

.kana-char {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 28px;
  line-height: 1;
}

.kana-romaji {
  position: absolute;
  bottom: 5px;
  color: var(--muted);
  font-size: 9px;
  font-weight: 750;
}

.detail-card, .quiz-card, .write-card {
  padding: 18px;
}

.detail-kana {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 16px;
  padding: 18px 0;
}

.detail-kana strong {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 96px;
  line-height: 0.9;
}

.detail-kana span {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 56px;
  color: var(--muted);
  line-height: 1;
}

.quiz-card {
  min-height: 280px;
  display: grid;
  align-content: space-between;
  gap: 18px;
}

.prompt {
  text-align: center;
  display: grid;
  gap: 12px;
  padding: 16px 0;
}

.prompt .label {
  color: var(--accent);
  font-size: 12px;
  font-weight: 850;
}

.prompt .big {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 76px;
  line-height: 1;
}

.prompt .romaji {
  font-size: 46px;
  font-weight: 850;
}

.progress-track {
  height: 7px;
  background: rgba(31, 35, 32, 0.1);
  border-radius: var(--radius);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width 220ms ease;
}

.options {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.option {
  min-height: 62px;
  background: rgba(255, 255, 255, 0.62);
  border: 1px solid var(--line);
  font-weight: 820;
  font-size: 20px;
}

.option.is-correct { color: white; background: var(--celadon); border-color: var(--celadon); }
.option.is-wrong { color: white; background: var(--accent); border-color: var(--accent); }
.option.is-muted { opacity: 0.42; }

.write-stage {
  position: relative;
  height: min(292px, 38dvh);
  min-height: 224px;
  background: #fffefa;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
}

.copy-kana {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: rgba(184, 59, 64, 0.13);
  font-family: var(--kana-practice-font);
  font-size: 184px;
  font-weight: 760;
  line-height: 1;
  pointer-events: none;
}

.write-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(184, 59, 64, 0.14) 1px, transparent 1px),
    linear-gradient(90deg, rgba(184, 59, 64, 0.14) 1px, transparent 1px),
    linear-gradient(45deg, transparent 49.5%, rgba(184, 59, 64, 0.16) 50%, transparent 50.5%),
    linear-gradient(-45deg, transparent 49.5%, rgba(184, 59, 64, 0.16) 50%, transparent 50.5%);
  background-size: 50% 50%, 50% 50%, 100% 100%, 100% 100%;
  pointer-events: none;
}

canvas {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  touch-action: none;
}

.heatmap {
  display: grid;
  grid-template-columns: repeat(14, 1fr);
  gap: 5px;
}

.heat {
  aspect-ratio: 1 / 1;
  border-radius: 4px;
  background: rgba(31, 35, 32, 0.08);
  border: 1px solid rgba(31, 35, 32, 0.04);
}

.weak-list {
  display: grid;
  gap: 8px;
}

.weak-item {
  min-height: 50px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255, 255, 255, 0.58);
  border: 1px solid var(--line);
  border-radius: var(--radius);
}

.lesson-card {
  padding: 14px;
  display: grid;
  gap: 10px;
  background: rgba(255, 255, 255, 0.48);
  box-shadow: 0 8px 24px rgba(31, 35, 32, 0.06);
}

.quiz-write-stage {
  height: min(244px, 32dvh);
  min-height: 190px;
}

.quiz-write-stage.is-blank {
  background: rgba(255, 254, 250, 0.98);
}

.quiz-write-stage.is-reviewing {
  background: rgba(255, 254, 250, 0.9);
}

.write-snapshot {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

.lesson-card.is-current {
  border-color: rgba(184, 59, 64, 0.2);
  background: rgba(255, 255, 255, 0.62);
}

.lesson-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

.lesson-kana {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 26px;
  letter-spacing: 0;
}

.script-progress {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}

.script-progress span {
  padding: 8px 10px;
  border: 1px solid rgba(31, 35, 32, 0.08);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.42);
  color: var(--muted);
  font-size: 11px;
  font-weight: 780;
}

.status-pill {
  padding: 6px 9px;
  border-radius: var(--radius);
  background: rgba(31, 35, 32, 0.08);
  color: var(--muted);
  font-size: 11px;
  font-weight: 820;
  white-space: nowrap;
}

.status-pill.is-open {
  color: var(--accent-dark);
  background: rgba(184, 59, 64, 0.1);
}

.status-pill.is-done {
  color: #2c6b59;
  background: rgba(93, 139, 125, 0.16);
}

.sound-hint {
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
}

.self-check {
  display: grid;
  gap: 10px;
}

.answer-reveal {
  min-height: 74px;
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 10px 12px;
  border: 1px solid rgba(184, 59, 64, 0.16);
  border-radius: var(--radius);
  background: rgba(184, 59, 64, 0.07);
}

.answer-reveal span {
  color: var(--muted);
  font-size: 12px;
  font-weight: 780;
  text-align: left;
}

.answer-reveal strong {
  font-family: var(--kana-practice-font);
  font-size: 48px;
  line-height: 1;
}

.answer-reveal em {
  color: var(--muted);
  font-style: normal;
  font-size: 15px;
  font-weight: 820;
}

.self-check-actions {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}

.tabbar {
  position: fixed;
  left: 50%;
  right: auto;
  bottom: max(0px, calc(env(safe-area-inset-bottom) - 24px));
  z-index: 35;
  width: calc(100vw - 32px);
  max-width: 430px;
  margin: 0;
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 3px;
  padding: 6px;
  border: 1px solid rgba(255, 255, 255, 0.78);
  border-radius: var(--radius);
  background:
    linear-gradient(180deg, rgba(255, 255, 253, 0.82), rgba(244, 246, 242, 0.68));
  box-shadow: 0 -18px 42px rgba(31, 35, 32, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.62);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  transform: translateX(-50%);
}

.tab-button {
  min-width: 0;
  display: grid;
  place-items: center;
  gap: 2px;
  color: var(--muted);
  font-size: 10px;
  font-weight: 780;
  padding: 3px 0 2px;
}

.tab-button strong { font-size: 18px; line-height: 1; }
.tab-button.is-active {
  color: var(--accent);
  background: rgba(184, 59, 64, 0.09);
  box-shadow: inset 0 0 0 1px rgba(184, 59, 64, 0.08);
}

.toast {
  position: fixed;
  left: 18px;
  right: 18px;
  bottom: calc(env(safe-area-inset-bottom) + 66px);
  z-index: 60;
  max-width: 420px;
  margin: 0 auto;
  padding: 12px 14px;
  border-radius: var(--radius);
  color: white;
  background: rgba(31, 35, 32, 0.92);
  box-shadow: var(--shadow);
  text-align: center;
  font-size: 13px;
  font-weight: 760;
}

.version-overlay {
  position: fixed;
  inset: 0;
  z-index: 90;
  display: grid;
  align-items: start;
  justify-items: center;
  padding: calc(env(safe-area-inset-top) + 86px) 16px calc(env(safe-area-inset-bottom) + 24px);
  background: rgba(31, 35, 32, 0.18);
  backdrop-filter: blur(18px) saturate(135%);
  -webkit-backdrop-filter: blur(18px) saturate(135%);
}

.study-overlay {
  position: fixed;
  inset: 0;
  z-index: 88;
  display: grid;
  align-items: end;
  justify-items: center;
  padding: calc(env(safe-area-inset-top) + 24px) 16px calc(env(safe-area-inset-bottom) + 92px);
  background: rgba(31, 35, 32, 0.16);
  backdrop-filter: blur(18px) saturate(135%);
  -webkit-backdrop-filter: blur(18px) saturate(135%);
}

.study-sheet {
  width: min(100%, 430px);
  display: grid;
  gap: 14px;
  padding: 16px;
  border: 1px solid rgba(255, 255, 255, 0.76);
  border-radius: var(--radius);
  background:
    linear-gradient(180deg, rgba(255, 255, 253, 0.92), rgba(244, 246, 242, 0.78));
  box-shadow: 0 24px 70px rgba(31, 35, 32, 0.22);
  backdrop-filter: blur(34px) saturate(180%);
  -webkit-backdrop-filter: blur(34px) saturate(180%);
}

.study-sheet-title {
  display: grid;
  gap: 4px;
}

.study-sheet-title strong {
  font-size: 19px;
  line-height: 1.2;
}

.study-actions {
  display: grid;
  gap: 8px;
}

.version-sheet {
  width: min(100%, 430px);
  max-height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 112px);
  overflow: auto;
  display: grid;
  gap: 14px;
  padding: 16px;
  border: 1px solid rgba(255, 255, 255, 0.76);
  border-radius: var(--radius);
  background:
    linear-gradient(180deg, rgba(255, 255, 253, 0.86), rgba(244, 246, 242, 0.72));
  box-shadow: 0 24px 70px rgba(31, 35, 32, 0.22);
  backdrop-filter: blur(34px) saturate(180%);
  -webkit-backdrop-filter: blur(34px) saturate(180%);
}

.version-sheet-head {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 12px;
}

.version-sheet-title {
  display: grid;
  gap: 4px;
}

.version-sheet-title strong {
  font-size: 20px;
  line-height: 1.15;
}

.version-close {
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(31, 35, 32, 0.08);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.58);
  color: var(--muted);
  font-size: 22px;
  line-height: 1;
}

.version-info-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}

.version-info-item {
  min-height: 64px;
  padding: 10px;
  display: grid;
  align-content: space-between;

  function scoreJapaneseVoice(voice) {
    if (!voice?.lang) return -1;
    const lang = voice.lang.toLowerCase();
    if (!lang.startsWith("ja")) return -1;
    const name = voice.name.toLowerCase();
    let score = lang === "ja-jp" ? 60 : 44;
    [
      ["neural", 22], ["natural", 22], ["premium", 18], ["enhanced", 18],
      ["google", 16], ["microsoft", 12], ["nanami", 18], ["haruka", 16],
      ["ayumi", 14], ["ichiro", 14], ["kyoko", 18], ["otoya", 16],
      ["siri", 14], ["japanese", 8], ["日本", 8]
    ].forEach(([hint, value]) => {
      if (name.includes(hint)) score += value;
    });
    if (voice.localService) score += 4;
    if (name.includes("compact") || name.includes("eloquence")) score -= 22;
    return score;
  }
  function refreshJapaneseVoice() {
    if (!("speechSynthesis" in window)) return null;
    japaneseVoice = window.speechSynthesis.getVoices()
      .filter((voice) => scoreJapaneseVoice(voice) >= 0)
      .sort((a, b) => scoreJapaneseVoice(b) - scoreJapaneseVoice(a))[0] || null;
    return japaneseVoice;
  }
  function getJapaneseVoice() {
    return japaneseVoice || refreshJapaneseVoice();
  }
  function hasNaturalJapaneseVoice(voice) {
    return Boolean(voice && scoreJapaneseVoice(voice) >= 72);
  }
  function speakFallback(text, notify = false) {
    if (!("speechSynthesis" in window)) {
      if (notify) showToast("音频暂不可用，请稍后重试");
      return false;
    }
    const voice = getJapaneseVoice();
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    if (voice) utter.voice = voice;
    utter.lang = voice?.lang || "ja-JP";
    utter.rate = voice ? 0.58 : 0.56;
    utter.pitch = 1;
    utter.volume = 1;
    window.speechSynthesis.speak(utter);
    return true;
  }
  function playKana(id) {
    const item = byId[id];
    if (!item) return;
    const voice = getJapaneseVoice();
    if (!item.audio || hasNaturalJapaneseVoice(voice)) {
      if (speakFallback(item.hira, !item.audio)) return;
      if (!item.audio) return;
    }
    let audio = audioCache.get(id);
    if (!audio) {
      audio = new Audio(item.audio);
      audio.preload = "auto";
      audioCache.set(id, audio);
    }
    audio.currentTime = 0;
    audio.playbackRate = 0.72;
    audio.play().catch(() => speakFallback(item.hira, true));
  }

  function uniqueItems(items) {
    return [...new Map(items.filter(Boolean).map((item) => [item.id, item])).values()];
  }
  function rankedItems(items, dueBoost = 120) {
    const now = Date.now();
    return uniqueItems(items).map((item) => {
      const rec = readRecord(item.id);
      let score = Math.random();
      if (!rec.lastSeen) score += 80;
      if (rec.nextReview && rec.nextReview <= now) score += dueBoost;
      score += rec.wrong * 14 + (5 - rec.mastery) * 7 - rec.correct;
      return { item, score };
    }).sort((a, b) => b.score - a.score).map((entry) => entry.item);
  }
  function expandQueue(items, size = QUIZ_SIZE) {
    const ranked = rankedItems(items);
    const queue = [];
    if (!ranked.length) return queue;
    while (queue.length < size) {
      const round = ranked.map((item) => ({ item, sort: Math.random() })).sort((a, b) => a.sort - b.sort).map((entry) => entry.item);
      queue.push(...round);
    }
    return queue.slice(0, size);
  }
  function buildLessonQueue(lesson) {
    return expandQueue(lesson.ids.map((id) => byId[id]), QUIZ_SIZE);
  }
  function buildDailyReviewQueue() {
    const due = dueReviewItems();
    if (!due.length) return [];
    const lowMastery = learnedItems().filter((item) => readRecord(item.id).mastery < 4);
    const pool = uniqueItems([...due, ...weakestItems(), ...lowMastery, ...learnedItems()]);
    return expandQueue(rankedItems(pool, 180), QUIZ_SIZE);
  }
  function createQuiz(mode, queue, options = {}) {

  function startDailyStudy() {

  function startDrillQuiz(lessonId, script = data.settings.drillScript || "hira") {

  function questionTypeForIndex(index) {
    const reviewPattern = ["sound", "kana", "writeSound", "lesson", "sound", "kana", "writeSound", "sound", "kana", "lesson"];
    const lessonPattern = ["lesson", "sound", "writeSound", "kana", "lesson", "sound", "kana", "writeSound", "sound", "kana", "lesson", "writeSound", "sound", "kana", "writeSound"];
    const pattern = quiz?.mode === "review" ? reviewPattern : lessonPattern;
    return pattern[index % pattern.length];
  }
  function optionPoolForQuestion(target) {
    const scoped = quiz?.lessonId && quiz.mode !== "review"
      ? lessonById(quiz.lessonId).ids.map((id) => byId[id]).filter(Boolean)
      : availableItems();
    return uniqueItems([target, ...scoped]);
  }
  function makeQuestion() {
    if (!quiz || quiz.done) return null;
    const target = quiz.queue[quiz.index];
    const type = questionTypeForIndex(quiz.index);
    const optionPool = optionPoolForQuestion(target);
    const hardPool = optionPool.filter((item) => item.id !== target.id && (item.row === target.row || item.vowel === target.vowel || item.hira.length === target.hira.length));
    const wrong = [...new Map([...hardPool, ...optionPool.filter((item) => item.id !== target.id)].sort(() => Math.random() - 0.5).map((item) => [item.id, item])).values()].slice(0, 3);
    return { target, type, options: [target, ...wrong].sort(() => Math.random() - 0.5) };
  }
  function currentQuestion() {
    if (!quiz || quiz.done) return null;

  }
  function answerQuiz(id) {

    const target = q.target;
    const correct = id === target.id;
    quiz.selected = id;

    render();
    window.setTimeout(advanceQuiz, 1180);

  function recordQuestionResult(q, correct, selected) {
    if (correct) quiz.correct += 1;

  function advanceQuiz() {
    if (!quiz) return;

  function setupCanvas() {
    const canvas = document.getElementById("writeCanvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const resize = () => {
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.round(rect.width * scale));
      canvas.height = Math.max(1, Math.round(rect.height * scale));
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#1f2320";
    };
    resize();
    let drawing = false;
    let last = null;
    const point = (event) => {
      const rect = canvas.getBoundingClientRect();
      return { x: event.clientX - rect.left, y: event.clientY - rect.top };
    };
    canvas.onpointerdown = (event) => {
      drawing = true;
      last = point(event);
      canvas.setPointerCapture(event.pointerId);
    };
    canvas.onpointermove = (event) => {
      if (!drawing) return;
      const next = point(event);
      const distance = Math.hypot(next.x - last.x, next.y - last.y);
      ctx.lineWidth = Math.max(3, 10 - distance * 0.24);
      ctx.beginPath();
      ctx.moveTo(last.x, last.y);
      ctx.lineTo(next.x, next.y);
      ctx.stroke();
      last = next;
    };
    canvas.onpointerup = canvas.onpointercancel = () => { drawing = false; last = null; };
    canvas.dataset.ready = "1";
  }

    if (action === "play") playKana(el.dataset.id);
    if (action === "write-id" || action === "detail-write") { data.settings.writeId = el.dataset.id; tab = "write"; saveData(); render(); }
    if (action === "write-script") { data.settings.writeScript = el.dataset.script; saveData(); render(); }
    if (action === "toggle-write-script") { data.settings.writeScript = (data.settings.writeScript || "hira") === "hira" ? "kata" : "hira"; saveData(); render(); }
    if (action === "drill-script") { data.settings.drillScript = el.dataset.script; saveData(); render(); }
    if (action === "clear-canvas") clearCanvas();
    if (action === "go-lesson-write") { const lesson = lessonById(el.dataset.lesson); setWriteTarget(lesson, el.dataset.script || data.settings.writeScript || "hira"); tab = "write"; saveData(); render(); }
    if (action === "mark-traced") {
      const script = data.settings.writeScript || "hira";
      const lesson = lessonForItem(el.dataset.id);
      markTraced(el.dataset.id, script);
      const next = lesson.ids.find((id) => !isScriptTraced(lesson, id, script));
      if (next) data.settings.writeId = next;
      else studyPrompt = { lessonId: lesson.id, script };
      saveData();
      render();
    }
    if (action === "start-daily-study") startDailyStudy();
    if (action === "start-review-quiz") startReviewQuiz(tab === "quiz" ? "quiz" : "home");
    if (action === "start-lesson-quiz") startLessonQuiz(el.dataset.lesson, el.dataset.script || data.settings.writeScript || "hira", tab === "quiz" ? "quiz" : "home");
    if (action === "start-drill-quiz") startDrillQuiz(el.dataset.lesson, el.dataset.script || data.settings.drillScript || "hira");
    if (action === "answer") answerQuiz(el.dataset.id);
    if (action === "show-write-answer") showWriteAnswer();
    if (action === "self-check") answerSelfCheck(el.dataset.correct === "1");
    if (action === "continue-after-quiz") continueAfterQuiz();
    if (action === "backup") copyBackup();
    if (action === "restore") restoreBackup();
    if (action === "reset" && confirm("确定清空 KanaZen 的学习数据吗？")) { localStorage.removeItem(STORAGE_KEY); data = loadData(); quiz = null; render(); }
  });
  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape" && versionSheetOpen) {
      versionSheetOpen = false;
      render();
    }
  });
  if ("speechSynthesis" in window) {
    refreshJapaneseVoice();
    window.speechSynthesis.onvoiceschanged = () => { refreshJapaneseVoice(); };
  }
  if ("serviceWorker" in navigator && location.protocol !== "file:") {
    setupAutoUpdate();
  }
  render();
})();

  </script>
</body>
</html>
