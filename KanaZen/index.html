<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f6f2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KanaZen">
  <meta name="format-detection" content="telephone=no">
  <title>KanaZen</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/icons/icon-1024.png">
  <link rel="icon" href="./assets/icons/icon-192.png" type="image/png">
  <style>
:root {
  --paper: #f4f6f2;
  --paper-2: #e7ece6;
  --ink: #1f2320;
  --muted: #70756d;
  --line: rgba(31, 35, 32, 0.12);
  --glass: rgba(255, 255, 253, 0.72);
  --accent: #b83b40;
  --accent-dark: #812b2f;
  --celadon: #5d8b7d;
  --gold: #b28a3f;
  --shadow: 0 18px 45px rgba(31, 35, 32, 0.12);
  --bar: rgba(246, 246, 241, 0.86);
  --radius: 8px;
  --tap: 48px;
  --kana-practice-font: "Yu Kyokasho", "UD Digi Kyokasho N-R", "Hiragino Maru Gothic ProN", "Hiragino Sans", "Yu Gothic", "Noto Sans CJK JP", sans-serif;
}

* { box-sizing: border-box; }

html, body {
  width: 100%;
  min-height: 100%;
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
    "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans CJK SC", sans-serif;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior-y: none;
}

body {
  min-height: 100dvh;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.5;
  background-image:
    linear-gradient(rgba(31, 35, 32, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(31, 35, 32, 0.025) 1px, transparent 1px);
  background-size: 32px 32px, 32px 32px;
}

button, input, textarea {
  font: inherit;
}

button {
  border: 0;
  color: inherit;
  background: none;
  touch-action: manipulation;
}

.app-shell {
  position: relative;
  width: 100%;
  height: 100dvh;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(244, 246, 242, 0.96), rgba(231, 236, 230, 0.88));
}

.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 30;
  padding: calc(env(safe-area-inset-top) + 10px) 18px 10px;
  background: var(--bar);
  backdrop-filter: blur(24px) saturate(150%);
  -webkit-backdrop-filter: blur(24px) saturate(150%);
  border-bottom: 1px solid rgba(31, 35, 32, 0.08);
}

.brand-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  max-width: 720px;
  margin: 0 auto;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.brand-mark {
  width: 38px;
  height: 38px;
  display: block;
  object-fit: cover;
  border-radius: 10px;
  background: #f3efe4;
  border: 1px solid rgba(31, 35, 32, 0.08);
  box-shadow: 0 10px 24px rgba(31, 35, 32, 0.1);
}

.brand-title {
  display: grid;
  gap: 2px;
  min-width: 0;
}

.brand-title strong {
  font-size: 18px;
  line-height: 1;
}

.brand-title span {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
}

.view-title {
  text-align: right;
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
}

.content {
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: calc(env(safe-area-inset-top) + 78px) 16px calc(env(safe-area-inset-bottom) + 84px);
}

.screen {
  width: min(100%, 720px);
  margin: 0 auto;
  animation: rise 260ms ease both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.stack { display: grid; gap: 14px; }
.row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.tight { display: grid; gap: 8px; }

.panel {
  border: 1px solid rgba(255, 255, 255, 0.72);
  border-radius: var(--radius);
  background: var(--glass);
  box-shadow: var(--shadow);
  backdrop-filter: blur(26px) saturate(145%);
  -webkit-backdrop-filter: blur(26px) saturate(145%);
}

.section-title {
  margin: 4px 2px 0;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

.hero-panel {
  padding: 20px;
  min-height: 214px;
  display: grid;
  align-content: space-between;
  gap: 20px;
}

.hero-kana {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}

.hero-kana .kana {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", "Times New Roman", serif;
  font-size: 86px;
  line-height: 0.95;
  font-weight: 700;
}

.metric-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.home-metrics {
  grid-template-columns: repeat(2, 1fr);
}

.metric {
  min-height: 72px;
  padding: 12px;
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.54);
  border: 1px solid var(--line);
}

.metric strong {
  display: block;
  font-size: 24px;
  line-height: 1.1;
}

.metric span {
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
}

.primary-button, .ghost-button, .danger-button, .chip, .tab-button, .kana-cell, .option {
  min-height: var(--tap);
  border-radius: var(--radius);
  transition: transform 140ms ease, opacity 140ms ease, background 180ms ease, border-color 180ms ease;
}

.primary-button:active, .ghost-button:active, .danger-button:active, .chip:active,
.tab-button:active, .kana-cell:active, .option:active {
  transform: scale(0.98);
}

button:disabled {
  opacity: 0.42;
  pointer-events: none;
}

.primary-button {
  width: 100%;
  padding: 14px 16px;
  color: white;
  background: var(--ink);
  font-weight: 800;
  box-shadow: 0 18px 32px rgba(31, 35, 32, 0.18);
}

.accent-button { background: var(--accent); box-shadow: 0 18px 32px rgba(184, 59, 64, 0.24); }

.ghost-button, .danger-button {
  width: 100%;
  padding: 12px 14px;
  background: rgba(255, 255, 255, 0.58);
  border: 1px solid var(--line);
  color: var(--ink);
  font-weight: 750;
}

.danger-button { color: var(--accent-dark); }

.segmented, .chip-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 2px;
  scrollbar-width: none;
}

.segmented::-webkit-scrollbar, .chip-row::-webkit-scrollbar { display: none; }

.write-toolbar {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 10px;
  align-items: center;
}

.write-toolbar .segmented,
.write-toolbar .chip-row {
  min-width: 0;
}

.write-toolbar .chip-row .chip {
  font-family: var(--kana-practice-font);
  font-size: 18px;
  font-weight: 760;
}

.write-actions {
  display: grid;
  grid-template-columns: 0.82fr 1.18fr;
  gap: 8px;
  align-items: stretch;
}

.write-actions.secondary {
  grid-template-columns: repeat(3, 1fr);
}

.chip {
  padding: 0 14px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.58);
  color: var(--muted);
  font-size: 13px;
  font-weight: 780;
  white-space: nowrap;
}

.chip.is-active {
  color: white;
  background: var(--ink);
  border-color: var(--ink);
}

.chip.is-done:not(.is-active) {
  color: #2c6b59;
  background: rgba(93, 139, 125, 0.16);
  border-color: rgba(93, 139, 125, 0.22);
}

.kana-board {
  display: grid;
  gap: 8px;
}

.kana-row {
  display: grid;
  grid-template-columns: 32px repeat(5, minmax(0, 1fr));
  gap: 7px;
  align-items: center;
}

.row-label {
  color: var(--muted);
  font-weight: 800;
  font-size: 12px;
  text-align: center;
}

.kana-cell {
  aspect-ratio: 1 / 1;
  min-height: 0;
  display: grid;
  place-items: center;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.56);
  position: relative;
}

.kana-cell.is-empty {
  background: transparent;
  border-color: transparent;
  box-shadow: none;
  pointer-events: none;
}

.kana-cell.is-locked {
  opacity: 0.34;
  filter: grayscale(0.8);
}

.kana-char {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 28px;
  line-height: 1;
}

.kana-romaji {
  position: absolute;
  bottom: 5px;
  color: var(--muted);
  font-size: 9px;
  font-weight: 750;
}

.detail-card, .quiz-card, .write-card {
  padding: 18px;
}

.detail-kana {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 16px;
  padding: 18px 0;
}

.detail-kana strong {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 96px;
  line-height: 0.9;
}

.detail-kana span {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 56px;
  color: var(--muted);
  line-height: 1;
}

.quiz-card {
  min-height: 280px;
  display: grid;
  align-content: space-between;
  gap: 18px;
}

.prompt {
  text-align: center;
  display: grid;
  gap: 12px;
  padding: 16px 0;
}

.prompt .label {
  color: var(--accent);
  font-size: 12px;
  font-weight: 850;
}

.prompt .big {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 76px;
  line-height: 1;
}

.prompt .romaji {
  font-size: 46px;
  font-weight: 850;
}

.progress-track {
  height: 7px;
  background: rgba(31, 35, 32, 0.1);
  border-radius: var(--radius);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width 220ms ease;
}

.options {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.option {
  min-height: 62px;
  background: rgba(255, 255, 255, 0.62);
  border: 1px solid var(--line);
  font-weight: 820;
  font-size: 20px;
}

.option.is-correct { color: white; background: var(--celadon); border-color: var(--celadon); }
.option.is-wrong { color: white; background: var(--accent); border-color: var(--accent); }
.option.is-muted { opacity: 0.42; }

.write-stage {
  position: relative;
  height: min(292px, 38dvh);
  min-height: 224px;
  background: #fffefa;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
}

.copy-kana {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: rgba(184, 59, 64, 0.13);
  font-family: var(--kana-practice-font);
  font-size: 184px;
  font-weight: 760;
  line-height: 1;
  pointer-events: none;
}

.write-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(184, 59, 64, 0.14) 1px, transparent 1px),
    linear-gradient(90deg, rgba(184, 59, 64, 0.14) 1px, transparent 1px),
    linear-gradient(45deg, transparent 49.5%, rgba(184, 59, 64, 0.16) 50%, transparent 50.5%),
    linear-gradient(-45deg, transparent 49.5%, rgba(184, 59, 64, 0.16) 50%, transparent 50.5%);
  background-size: 50% 50%, 50% 50%, 100% 100%, 100% 100%;
  pointer-events: none;
}

canvas {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  touch-action: none;
}

.heatmap {
  display: grid;
  grid-template-columns: repeat(14, 1fr);
  gap: 5px;
}

.heat {
  aspect-ratio: 1 / 1;
  border-radius: 4px;
  background: rgba(31, 35, 32, 0.08);
  border: 1px solid rgba(31, 35, 32, 0.04);
}

.weak-list {
  display: grid;
  gap: 8px;
}

.weak-item {
  min-height: 50px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255, 255, 255, 0.58);
  border: 1px solid var(--line);
  border-radius: var(--radius);
}

.lesson-card {
  padding: 14px;
  display: grid;
  gap: 10px;
  background: rgba(255, 255, 255, 0.48);
  box-shadow: 0 8px 24px rgba(31, 35, 32, 0.06);
}

.lesson-card.is-current {
  border-color: rgba(184, 59, 64, 0.2);
  background: rgba(255, 255, 255, 0.62);
}

.lesson-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

.lesson-kana {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 26px;
  letter-spacing: 0;
}

.status-pill {
  padding: 6px 9px;
  border-radius: var(--radius);
  background: rgba(31, 35, 32, 0.08);
  color: var(--muted);
  font-size: 11px;
  font-weight: 820;
  white-space: nowrap;
}

.status-pill.is-open {
  color: var(--accent-dark);
  background: rgba(184, 59, 64, 0.1);
}

.status-pill.is-done {
  color: #2c6b59;
  background: rgba(93, 139, 125, 0.16);
}

.sound-hint {
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
}

.tabbar {
  position: fixed;
  left: 50%;
  right: auto;
  bottom: max(0px, calc(env(safe-area-inset-bottom) - 24px));
  z-index: 35;
  width: calc(100vw - 32px);
  max-width: 390px;
  margin: 0;
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 3px;
  padding: 6px;
  border: 1px solid rgba(255, 255, 255, 0.78);
  border-radius: var(--radius);
  background:
    linear-gradient(180deg, rgba(255, 255, 253, 0.82), rgba(244, 246, 242, 0.68));
  box-shadow: 0 -18px 42px rgba(31, 35, 32, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.62);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  transform: translateX(-50%);
}

.tab-button {
  min-width: 0;
  display: grid;
  place-items: center;
  gap: 2px;
  color: var(--muted);
  font-size: 10px;
  font-weight: 780;
  padding: 3px 0 2px;
}

.tab-button strong { font-size: 18px; line-height: 1; }
.tab-button.is-active {
  color: var(--accent);
  background: rgba(184, 59, 64, 0.09);
  box-shadow: inset 0 0 0 1px rgba(184, 59, 64, 0.08);
}

.toast {
  position: fixed;
  left: 18px;
  right: 18px;
  bottom: calc(env(safe-area-inset-bottom) + 66px);
  z-index: 60;
  max-width: 420px;
  margin: 0 auto;
  padding: 12px 14px;
  border-radius: var(--radius);
  color: white;
  background: rgba(31, 35, 32, 0.92);
  box-shadow: var(--shadow);
  text-align: center;
  font-size: 13px;
  font-weight: 760;
}

.small { color: var(--muted); font-size: 12px; line-height: 1.5; }
.hidden { display: none !important; }

@media (min-width: 760px) {
  .content { padding-left: 28px; padding-right: 28px; }
  .hero-kana .kana { font-size: 104px; }
  .write-stage { height: 340px; }
  .copy-kana { font-size: 236px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 1ms !important;
    transition-duration: 1ms !important;
    scroll-behavior: auto !important;
  }
}

  </style>
</head>

  <script>

  ].map(([id, row, vowel, hira, kata]) => ({ id, row, vowel, hira, kata, romaji: id, audio: `assets/audio/${id}.mp3` }));
  const ADVANCED_KANA = [

    ["da","dakuten","a","だ","ダ"],["de","dakuten","e","で","デ"],["do","dakuten","o","ど","ド"],["ba","dakuten","a","ば","バ"],["bi","dakuten","i","び","ビ"],
    ["bu","dakuten","u","ぶ","ブ"],["be","dakuten","e","べ","ベ"],["bo","dakuten","o","ぼ","ボ"],

  ].map(([id, row, vowel, hira, kata]) => ({ id, row, vowel, hira, kata, romaji: id, audio: "" }));
  const ALL_KANA = [...KANA, ...ADVANCED_KANA];
  const byId = Object.fromEntries(ALL_KANA.map((item) => [item.id, item]));
  const app = document.getElementById("app");
  const audioCache = new Map();
  let japaneseVoice = null;
  let data = loadData();
  let tab = "home";
  let scriptMode = data.settings.script || "hira";
  let quiz = null;
  let toastTimer = 0;
  let toastText = "";

  function loadData() {
    try {
      const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (parsed && parsed.version === 1) {
        parsed.records ||= {};
        parsed.activity ||= {};
        parsed.settings ||= {};
        parsed.lessons ||= {};
        return parsed;
      }
    } catch (error) {}
    return { version: 1, records: {}, activity: {}, lessons: {}, settings: { script: "hira", quizMode: "path", quizRow: "a", writeId: "a", writeScript: "hira", activeLesson: "a" } };
  }
  function saveData() {
    data.settings.script = scriptMode;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }
  function baseRecord() {
    return { mastery: 0, lastSeen: 0, nextReview: 0, correct: 0, wrong: 0 };
  }
  function readRecord(id) {
    return data.records[id] ? { ...baseRecord(), ...data.records[id] } : baseRecord();
  }
  function touchRecord(id) {
    data.records[id] = readRecord(id);
    return data.records[id];
  }
  function lessonById(id) {
    return LESSONS.find((lesson) => lesson.id === id) || BASE_LESSONS[0];
  }
  function lessonForItem(id) {
    return LESSONS.find((lesson) => lesson.ids.includes(id)) || BASE_LESSONS[0];
  }
  function lessonState(id) {
    data.lessons ||= {};
    data.lessons[id] ||= { traced: {}, best: 0, passed: false };
    data.lessons[id].traced ||= {};
    return data.lessons[id];
  }
  function baseComplete() {
    return BASE_LESSONS.every((lesson) => lessonState(lesson.id).passed);
  }
  function currentBaseLesson() {
    return BASE_LESSONS.find((lesson) => !lessonState(lesson.id).passed) || BASE_LESSONS[BASE_LESSONS.length - 1];
  }
  function currentAdvancedLesson() {
    return ADVANCED_LESSONS.find((lesson) => !lessonState(lesson.id).passed) || ADVANCED_LESSONS[ADVANCED_LESSONS.length - 1];
  }
  function currentLesson() {
    return baseComplete() ? currentAdvancedLesson() : currentBaseLesson();
  }
  function isLessonUnlocked(lesson) {
    if (!lesson) return false;
    if (lesson.kind === "advanced") return baseComplete() && (lesson.index <= currentAdvancedLesson().index || lessonState(lesson.id).passed);
    return lesson.index <= currentBaseLesson().index || lessonState(lesson.id).passed;
  }
  function tracedCount(lesson) {
    const traced = lessonState(lesson.id).traced;
    return lesson.ids.filter((id) => traced[id]).length;
  }
  function lessonReady(lesson) {
    return tracedCount(lesson) >= lesson.ids.length;
  }
  function markTraced(id) {
    const lesson = lessonForItem(id);
    lessonState(lesson.id).traced[id] = Date.now();
    markActivity();
    saveData();
  }
  function passLesson(lesson, score) {
    const state = lessonState(lesson.id);
    state.best = Math.max(state.best || 0, score);
    if (score >= lesson.passScore) state.passed = true;
    saveData();
  }
  function unlockedBaseItems() {
    const ids = BASE_LESSONS.filter(isLessonUnlocked).flatMap((lesson) => lesson.ids);
    return ids.map((id) => byId[id]).filter(Boolean);
  }
  function availableItems() {
    const advancedIds = baseComplete() ? ADVANCED_LESSONS.filter(isLessonUnlocked).flatMap((lesson) => lesson.ids) : [];
    return [...unlockedBaseItems(), ...advancedIds.map((id) => byId[id]).filter(Boolean)];
  }
  function todayKey(offset = 0) {
    const d = new Date();
    d.setDate(d.getDate() + offset);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }
  function markActivity() {
    const key = todayKey();
    data.activity[key] = (data.activity[key] || 0) + 1;
  }
  function updateRecord(id, correct) {
    const rec = touchRecord(id);
    const now = Date.now();
    rec.lastSeen = now;
    if (correct) {
      rec.correct += 1;
      rec.mastery = Math.min(5, rec.mastery + 1);
      const days = [0.25, 0.5, 1, 2, 4, 7][rec.mastery];
      rec.nextReview = now + days * 86400000;
    } else {
      rec.wrong += 1;
      rec.mastery = Math.max(0, rec.mastery - 1);
      rec.nextReview = now + 10 * 60000;
    }
    markActivity();
    saveData();
  }
  function stats() {
    const values = KANA.map((item) => readRecord(item.id));
    const learned = values.filter((r) => r.lastSeen).length;
    const mastered = values.filter((r) => r.mastery >= 4).length;
    const due = values.filter((r) => r.nextReview && r.nextReview <= Date.now()).length;
    const passedRows = BASE_LESSONS.filter((lesson) => lessonState(lesson.id).passed).length;
    const advancedPassed = ADVANCED_LESSONS.filter((lesson) => lessonState(lesson.id).passed).length;
    const weakCount = weakestItems().length;
    const reviewCount = availableItems().filter((item) => {
      const rec = readRecord(item.id);
      return rec.wrong > 0 || (rec.lastSeen && rec.mastery < 3) || (rec.nextReview && rec.nextReview <= Date.now());
    }).length;
    return { learned, mastered, due, weakCount, reviewCount, passedRows, advancedPassed, streak: streakDays(), today: data.activity[todayKey()] || 0 };
  }
  function streakDays() {
    let total = 0;
    for (let i = 0; i < 365; i += 1) {
      if (!data.activity[todayKey(-i)]) break;
      total += 1;
    }
    return total;
  }
  function charFor(item, mode = scriptMode) {

    return String(value).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c]));

  function showToast(text) {

  function scoreJapaneseVoice(voice) {
    if (!voice?.lang) return -1;
    const lang = voice.lang.toLowerCase();
    if (!lang.startsWith("ja")) return -1;
    const name = voice.name.toLowerCase();
    let score = lang === "ja-jp" ? 60 : 44;
    [
      ["neural", 22], ["natural", 22], ["premium", 18], ["enhanced", 18],
      ["google", 16], ["microsoft", 12], ["nanami", 18], ["haruka", 16],
      ["ayumi", 14], ["ichiro", 14], ["kyoko", 18], ["otoya", 16],
      ["siri", 14], ["japanese", 8], ["日本", 8]
    ].forEach(([hint, value]) => {
      if (name.includes(hint)) score += value;
    });
    if (voice.localService) score += 4;
    if (name.includes("compact") || name.includes("eloquence")) score -= 22;
    return score;
  }
  function refreshJapaneseVoice() {
    if (!("speechSynthesis" in window)) return null;
    japaneseVoice = window.speechSynthesis.getVoices()
      .filter((voice) => scoreJapaneseVoice(voice) >= 0)
      .sort((a, b) => scoreJapaneseVoice(b) - scoreJapaneseVoice(a))[0] || null;
    return japaneseVoice;
  }
  function getJapaneseVoice() {
    return japaneseVoice || refreshJapaneseVoice();
  }
  function hasNaturalJapaneseVoice(voice) {
    return Boolean(voice && scoreJapaneseVoice(voice) >= 72);
  }
  function speakFallback(text, notify = false) {
    if (!("speechSynthesis" in window)) {
      if (notify) showToast("音频暂不可用，请稍后重试");
      return false;
    }
    const voice = getJapaneseVoice();
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    if (voice) utter.voice = voice;
    utter.lang = voice?.lang || "ja-JP";
    utter.rate = voice ? 0.58 : 0.56;
    utter.pitch = 1;
    utter.volume = 1;
    window.speechSynthesis.speak(utter);
    return true;
  }
  function playKana(id) {
    const item = byId[id];
    if (!item) return;
    const voice = getJapaneseVoice();
    if (!item.audio || hasNaturalJapaneseVoice(voice)) {
      if (speakFallback(item.hira, !item.audio)) return;
      if (!item.audio) return;
    }
    let audio = audioCache.get(id);
    if (!audio) {
      audio = new Audio(item.audio);
      audio.preload = "auto";
      audioCache.set(id, audio);
    }
    audio.currentTime = 0;
    audio.playbackRate = 0.72;
    audio.play().catch(() => speakFallback(item.hira, true));
  }

  function buildLessonQueue(lesson) {
    const now = Date.now();
    const pool = lesson.ids.map((id) => byId[id]).filter(Boolean);
    const ranked = pool.map((item) => {
      const rec = readRecord(item.id);
      let score = Math.random();
      if (!rec.lastSeen) score += 80;
      if (rec.nextReview && rec.nextReview <= now) score += 120;
      score += rec.wrong * 10 + (5 - rec.mastery) * 4 - rec.correct;
      return { item, score };
    }).sort((a, b) => b.score - a.score).map((entry) => entry.item);
    while (ranked.length < 10 && pool.length) ranked.push(pool[Math.floor(Math.random() * pool.length)]);
    return ranked.slice(0, 10);
  }
  function startLessonQuiz(lessonId) {
    const lesson = lessonById(lessonId);
    if (!lesson) { showToast("没有找到这一课"); return; }
    if (!isLessonUnlocked(lesson)) { showToast("先通过前一课，再解锁这里"); return; }
    if (!lessonReady(lesson)) { showToast("先把这一组都临摹一遍"); return; }
    data.settings.quizRow = lesson.id;
    const queue = buildLessonQueue(lesson);
    if (!queue.length) { showToast("这一组还没有可练习的假名"); return; }
    quiz = { lessonId: lesson.id, queue, index: 0, correct: 0, selected: null, done: false, played: "", question: null, misses: [] };
    quiz.question = makeQuestion();
    tab = "lessonQuiz";
    saveData();
    render();
  }
  function makeQuestion() {
    if (!quiz || quiz.done) return null;
    const target = quiz.queue[quiz.index];
    const type = "lesson";
    const optionPool = availableItems();
    const hardPool = optionPool.filter((item) => item.id !== target.id && (item.row === target.row || item.vowel === target.vowel || item.hira.length === target.hira.length));
    const wrong = [...new Map([...hardPool, ...optionPool.filter((item) => item.id !== target.id)].sort(() => Math.random() - 0.5).map((item) => [item.id, item])).values()].slice(0, 3);
    return { target, type, options: [target, ...wrong].sort(() => Math.random() - 0.5) };
  }
  function currentQuestion() {
    if (!quiz || quiz.done) return null;
    if (!quiz.question) quiz.question = makeQuestion();
    return quiz.question;
  }
  function answerQuiz(id) {
    if (!quiz || quiz.selected) return;
    const target = quiz.queue[quiz.index];
    const correct = id === target.id;
    quiz.selected = id;
    if (correct) quiz.correct += 1;
    else quiz.misses.push({ target: target.id, selected: id });
    updateRecord(target.id, correct);
    playKana(target.id);
    render();
    window.setTimeout(() => {
      if (!quiz) return;
      quiz.index += 1;
      quiz.selected = null;
      quiz.played = "";
      if (quiz.index >= 10) {
        quiz.done = true;
        passLesson(lessonById(quiz.lessonId), quiz.correct);
      } else quiz.question = makeQuestion();
      render();
    }, 1180);
  }

  function renderLessonCard(lesson, actions = true) {

        <div class="row"><strong>${lesson.name} 测验</strong><span class="small">${tracedCount(lesson)}/${lesson.ids.length} 已临摹</span></div>
        <p class="small">题目会显示罗马音并播放声音，从四个假名里选择正确答案。10 题达到 8 分就解锁下一课。</p>
        <button class="primary-button accent-button" data-action="${lessonReady(lesson) ? "start-lesson-quiz" : "go-lesson-write"}" data-lesson="${lesson.id}">${lessonReady(lesson) ? "开始测验" : "先去临摹"}</button>
      </div>
      <div class="stack">${[...BASE_LESSONS, ...(baseComplete() ? ADVANCED_LESSONS : [])].map((lesson) => renderLessonCard(lesson)).join("")}</div>
    </div>`;
  }
  function renderQuizActive() {
    const q = currentQuestion();
    const pct = (quiz.index / 10) * 100;
    const label = q.type === "lesson" ? "听音 + 罗马音选假名" : q.type === "sound" ? "听音选假名" : q.type === "romaji" ? "看罗马音选假名" : "看假名选罗马音";
    const prompt = q.type === "sound"
      ? `<button class="primary-button accent-button" data-action="play" data-id="${q.target.id}">播放读音</button>`
      : q.type === "lesson" ? `<div class="romaji">${q.target.romaji}</div><div class="sound-hint">${q.target.audio ? "已播放，没听到就点重播" : "使用自然日语语音"}</div><button class="ghost-button" data-action="play" data-id="${q.target.id}">重播声音</button>`
      : q.type === "romaji" ? `<div class="romaji">${q.target.romaji}</div>` : `<div class="big">${charFor(q.target)}</div>`;
    return `<div class="stack">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="panel quiz-card">
        <div class="prompt"><div class="label">${label} · ${quiz.index + 1}/10</div>${prompt}</div>
        <div class="options">${q.options.map((opt) => optionButton(q, opt)).join("")}</div>
      </div>
    </div>`;
  }
  function renderMissReview() {
    if (!quiz?.misses?.length) return "";
    return `<div class="panel detail-card tight"><div class="row"><strong>错题回顾</strong><span class="small">${quiz.misses.length} 题</span></div>
      <div class="weak-list">${quiz.misses.map((miss) => {
        const target = byId[miss.target];
        const selected = byId[miss.selected];
        return `<div class="weak-item"><strong>${target.hira} ${target.kata}</strong><span class="small">${target.romaji} · 你选了 ${selected ? charFor(selected) : "空"}</span></div>`;
      }).join("")}</div></div>`;
  }
  function optionButton(q, opt) {
    const answered = Boolean(quiz.selected);
    const isCorrect = answered && opt.id === q.target.id;
    const isWrong = answered && opt.id === quiz.selected && opt.id !== q.target.id;
    const muted = answered && !isCorrect && !isWrong;
    const text = q.type === "kana" ? opt.romaji : charFor(opt);
    return `<button class="option ${isCorrect ? "is-correct" : ""} ${isWrong ? "is-wrong" : ""} ${muted ? "is-muted" : ""}" data-action="answer" data-id="${opt.id}">${text}</button>`;
  }
  function renderWrite() {
    const id = data.settings.writeId || "a";
    const item = byId[id] || KANA[0];
    const mode = data.settings.writeScript || "hira";
    const lesson = lessonForItem(item.id);
    const traced = Boolean(lessonState(lesson.id).traced[item.id]);
    const lessonIndex = Math.max(0, lesson.ids.indexOf(item.id));
    const prevId = lesson.ids[lessonIndex - 1];
    const nextId = lesson.ids[lessonIndex + 1];
    return `<div class="stack">
      <div class="write-toolbar">
        <div class="segmented">
          <button class="chip ${mode === "hira" ? "is-active" : ""}" data-action="write-script" data-script="hira">平仮名</button>
          <button class="chip ${mode === "kata" ? "is-active" : ""}" data-action="write-script" data-script="kata">片仮名</button>
        </div>
        <div class="chip-row">${lesson.ids.map((kanaId) => {
          const k = byId[kanaId];
          const done = Boolean(lessonState(lesson.id).traced[k.id]);
          return `<button class="chip ${k.id === item.id ? "is-active" : ""} ${done ? "is-done" : ""}" data-action="write-id" data-id="${k.id}">${charFor(k, mode)}</button>`;
        }).join("")}</div>
      </div>
      <div class="panel write-card tight">
        <div class="row"><strong>${lesson.name} · ${item.romaji}</strong><span class="status-pill ${traced ? "is-done" : "is-open"}">${lessonIndex + 1}/${lesson.ids.length} · ${traced ? "已临摹" : "待临摹"}</span></div>
        <div class="write-actions">
          <button class="ghost-button" data-action="play" data-id="${item.id}">慢速播放</button>
          <button class="primary-button accent-button" data-action="mark-traced" data-id="${item.id}">${traced ? "继续下一个" : "我写好了"}</button>
        </div>
        <div class="write-stage"><div class="copy-kana">${charFor(item, mode)}</div><div class="write-grid"></div><canvas id="writeCanvas"></canvas></div>
        <div class="write-actions secondary">
          <button class="ghost-button" data-action="write-id" data-id="${prevId || item.id}" ${prevId ? "" : "disabled"}>上一个</button>
          <button class="ghost-button" data-action="write-id" data-id="${nextId || item.id}" ${nextId ? "" : "disabled"}>下一个</button>
          <button class="danger-button" data-action="clear-canvas">清除</button>
        </div>
      </div>
      <div class="panel detail-card tight"><div class="row"><strong>${lesson.name} 进度</strong><span class="small">${tracedCount(lesson)}/${lesson.ids.length}</span></div>
        <button class="primary-button" data-action="start-lesson-quiz" data-lesson="${lesson.id}" ${lessonReady(lesson) ? "" : "disabled"}>${lessonReady(lesson) ? "开始本课测验" : "临摹完本课后解锁测验"}</button></div>
    </div>`;
  }
  function renderProfile() {
    const s = stats();
    return `<div class="stack">
      <div class="metric-grid">
        <div class="metric"><strong>${s.learned}</strong><span>已接触</span></div>
        <div class="metric"><strong>${s.mastered}</strong><span>已稳固</span></div>
        <div class="metric"><strong>${s.streak}</strong><span>连续天数</span></div>
      </div>
      <div class="panel detail-card tight"><div class="row"><strong>课程进度</strong><span class="small">${s.passedRows}/10 基础行</span></div>
        <p class="small">${baseComplete() ? `进阶课程进行中，已通过 ${s.advancedPassed}/${ADVANCED_LESSONS.length} 个模块。` : `下一课：${currentBaseLesson().name}。每课临摹完成后，8/10 即可解锁下一行。`}</p></div>
      <div class="panel detail-card tight"><strong>近 14 天</strong><div class="heatmap">${heatmap()}</div></div>
      <div class="panel detail-card tight"><div class="row"><strong>学习统计</strong><span class="small">弱项 ${s.weakCount} · 到期 ${s.due}</span></div><div class="weak-list">${weakList()}</div></div>
      <div class="panel detail-card tight">
        <button class="ghost-button" data-action="backup">复制备份码</button>
        <button class="ghost-button" data-action="restore">恢复备份码</button>
        <button class="danger-button" data-action="reset">清空学习数据</button>
      </div>
    </div>`;
  }
  function heatmap() {
    return Array.from({ length: 14 }, (_, i) => {
      const count = data.activity[todayKey(i - 13)] || 0;
      const alpha = count ? Math.min(0.28 + count * 0.12, 0.92) : 0.08;
      return `<div class="heat" style="background:rgba(184,59,64,${alpha})"></div>`;
    }).join("");
  }
  function weakestItems() {
    return availableItems().map((item) => ({ item, rec: readRecord(item.id) }))
      .filter(({ rec }) => rec.wrong > 0 || (rec.lastSeen && rec.mastery < 3) || (rec.nextReview && rec.nextReview <= Date.now()))
      .sort((a, b) => (b.rec.wrong - a.rec.wrong) || (a.rec.mastery - b.rec.mastery))
      .map(({ item }) => item);
  }
  function weakList() {
    const list = weakestItems().slice(0, 3);
    if (!list.length) return `<p class="small">暂时没有需要特别提醒的弱项。</p>`;
    return list.map((item) => {
      const rec = readRecord(item.id);
      return `<div class="weak-item"><strong>${item.hira} ${item.kata}</strong><span class="small">${item.romaji} · 熟练度 ${rec.mastery}/5</span></div>`;
    }).join("");
  }
  function exportData() {
    const json = JSON.stringify({ exportedAt: new Date().toISOString(), data });
    const bytes = new TextEncoder().encode(json);
    let binary = "";
    bytes.forEach((byte) => { binary += String.fromCharCode(byte); });
    return btoa(binary);
  }
  function importData(code) {
    const bytes = Uint8Array.from(atob(code.trim()), (c) => c.charCodeAt(0));
    const parsed = JSON.parse(new TextDecoder().decode(bytes));
    if (!parsed.data || parsed.data.version !== 1 || typeof parsed.data.records !== "object") throw new Error("Invalid backup");
    data = parsed.data;
    data.settings ||= {};
    data.lessons ||= {};
    scriptMode = data.settings.script || "hira";
    saveData();
  }
  async function copyBackup() {
    const code = exportData();
    try {
      await navigator.clipboard.writeText(code);
      showToast("备份码已复制");
    } catch (error) {
      prompt("复制备份码：", code);
    }
  }
  function restoreBackup() {
    const code = prompt("粘贴备份码：");
    if (!code) return;
    try {
      importData(code);
      showToast("数据恢复成功");
      render();
    } catch (error) {
      showToast("备份码无效");
    }
  }
  function afterRender() {
    if (tab === "write") setupCanvas();
    if (tab === "lessonQuiz" && quiz && !quiz.done && !quiz.selected) {
      const q = currentQuestion();
      const key = `${quiz.index}:${q.type}:${q.target.id}`;
      if ((q.type === "sound" || q.type === "lesson") && quiz.played !== key) {
        quiz.played = key;
        window.setTimeout(() => playKana(q.target.id), 120);
      }
    }
  }
  function setupCanvas() {
    const canvas = document.getElementById("writeCanvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const resize = () => {
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.round(rect.width * scale));
      canvas.height = Math.max(1, Math.round(rect.height * scale));
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#1f2320";
    };
    resize();
    let drawing = false;
    let last = null;
    const point = (event) => {
      const rect = canvas.getBoundingClientRect();
      return { x: event.clientX - rect.left, y: event.clientY - rect.top };
    };
    canvas.onpointerdown = (event) => {
      drawing = true;
      last = point(event);
      canvas.setPointerCapture(event.pointerId);
    };
    canvas.onpointermove = (event) => {
      if (!drawing) return;
      const next = point(event);
      const distance = Math.hypot(next.x - last.x, next.y - last.y);
      ctx.lineWidth = Math.max(3, 10 - distance * 0.24);
      ctx.beginPath();
      ctx.moveTo(last.x, last.y);
      ctx.lineTo(next.x, next.y);
      ctx.stroke();
      last = next;
    };
    canvas.onpointerup = canvas.onpointercancel = () => { drawing = false; last = null; };
    canvas.dataset.ready = "1";
  }
  function clearCanvas() {
    const canvas = document.getElementById("writeCanvas");
    if (!canvas) return;
    canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
  }
  app.addEventListener("click", (event) => {
    const el = event.target.closest("[data-action]");
    if (!el) return;
    const action = el.dataset.action;
    if (action === "tab") { tab = el.dataset.tab; quiz = null; render(); }
    if (action === "script") { scriptMode = el.dataset.script; saveData(); render(); }
    if (action === "detail") { data.settings.detailId = el.dataset.id; playKana(el.dataset.id); saveData(); render(); }
    if (action === "play") playKana(el.dataset.id);
    if (action === "write-id" || action === "detail-write") { data.settings.writeId = el.dataset.id; tab = "write"; saveData(); render(); }
    if (action === "write-script") { data.settings.writeScript = el.dataset.script; saveData(); render(); }
    if (action === "clear-canvas") clearCanvas();
    if (action === "go-lesson-write") { const lesson = lessonById(el.dataset.lesson); data.settings.writeId = lesson.ids.find((id) => !lessonState(lesson.id).traced[id]) || lesson.ids[0]; tab = "write"; saveData(); render(); }
    if (action === "mark-traced") { const lesson = lessonForItem(el.dataset.id); markTraced(el.dataset.id); const next = lesson.ids.find((id) => !lessonState(lesson.id).traced[id]); if (next) data.settings.writeId = next; else showToast(`${lesson.name} 临摹完成，可以测验了`); saveData(); render(); }
    if (action === "start-lesson-quiz") startLessonQuiz(el.dataset.lesson);
    if (action === "answer") answerQuiz(el.dataset.id);
    if (action === "backup") copyBackup();
    if (action === "restore") restoreBackup();
    if (action === "reset" && confirm("确定清空 KanaZen 的学习数据吗？")) { localStorage.removeItem(STORAGE_KEY); data = loadData(); quiz = null; render(); }
  });
  if ("speechSynthesis" in window) {
    refreshJapaneseVoice();
    window.speechSynthesis.onvoiceschanged = () => { refreshJapaneseVoice(); };
  }
  if ("serviceWorker" in navigator && location.protocol !== "file:") {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  }
  render();
})();

  </script>
</body>
